    <g class="anim-phil">
      <text y="30" class="tp">
        <tspan x="4">BECOME WHO YOU ARE — NIETZSCHE ▸ EXISTENCE PRECEDES ESSENCE — SARTRE ▸ ONE MUST IMAGINE SISYPHUS HAPPY — CAMUS ▸ AMOR FATI ▸ CHAOS → CREATE STARS ▸ TO MASTER THE WAY IS TO MASTER ONESELF — MUSASHI ▸ THERE IS A REASON I REFUSE TO LOSE ▸        </tspan>
        <tspan>BECOME WHO YOU ARE — NIETZSCHE ▸ EXISTENCE PRECEDES ESSENCE — SARTRE ▸ ONE MUST IMAGINE SISYPHUS HAPPY — CAMUS ▸ AMOR FATI ▸ CHAOS → CREATE STARS ▸ TO MASTER THE WAY IS TO MASTER ONESELF — MUSASHI ▸ THERE IS A REASON I REFUSE TO LOSE ▸        </tspan>
      </text>
    </g>
  </g>

  <!-- Data ticker -->
  <g clip-path="url(#cp2)">
    <g class="anim-data">
      <text y="30" class="td">
        <tspan x="397">DATA CLEANING ▸ FEATURE ENGINEERING ▸ MODEL TRAINING ▸ HYPERPARAMETER TUNING ▸ AUMENTAR FATURAMENTO ▸ DIMINUIR CUSTOS ▸ MELHORAR QUALIDADE DE VIDA ▸ KS · GINI · AUC ▸ CRISP-DM ▸ OCI ALWAYS FREE ▸        </tspan>
        <tspan>DATA CLEANING ▸ FEATURE ENGINEERING ▸ MODEL TRAINING ▸ HYPERPARAMETER TUNING ▸ AUMENTAR ATURAMENTO ▸ DIMINUIR CUSTOS ▸ MELHORAR QUALIDADE DE VIDA ▸ KS · GINI · AUC ▸ CRISP-DM ▸ OCI ALWAYS FREE ▸        </tspan>
