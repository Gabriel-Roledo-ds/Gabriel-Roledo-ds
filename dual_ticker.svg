<svg xmlns="http://www.w3.org/2000/svg" width="780" height="72" viewBox="0 0 780 72">
  <defs>
    <style>
      .bg { fill: #000; }
      .hdr { fill: #111; }
      .border { fill: none; stroke: #222; stroke-width: 1; }
      .dot-r { fill: #ff5f57; }
      .dot-y { fill: #febc2e; }
      .dot-g { fill: #28c840; }
      .lbl { font-family: 'Courier New', monospace; font-size: 7px; letter-spacing: 1.5px; fill: #666; }
      .lbl-cyan { font-family: 'Courier New', monospace; font-size: 7px; letter-spacing: 1.5px; fill: #00e5cc; }
      .tick-phil { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 1px; fill: #cccccc; }
      .tick-data { font-family: 'Courier New', monospace; font-size: 10px; letter-spacing: 1px; fill: #00e5cc; }

      @keyframes scroll-phil {
        0%   { transform: translateX(0px); }
        100% { transform: translateX(-1400px); }
      }
      @keyframes scroll-data {
        0%   { transform: translateX(0px); }
        100% { transform: translateX(-1300px); }
      }
      .anim-phil {
        animation: scroll-phil 28s linear infinite;
      }
      .anim-data {
        animation: scroll-data 22s linear infinite;
      }
    </style>
    <clipPath id="clip-phil">
      <rect x="2" y="2" width="384" height="34" rx="3"/>
    </clipPath>
    <clipPath id="clip-data">
      <rect x="394" y="2" width="384" height="34" rx="3"/>
    </clipPath>
  </defs>

  <!-- Terminal 1: Philosophy -->
  <rect x="2" y="2" width="384" height="34" rx="3" class="bg"/>
  <rect x="2" y="2" width="384" height="12" rx="3" class="hdr"/>
  <rect x="2" y="8" width="384" height="6" class="hdr"/>
  <rect x="2" y="2" width="384" height="34" rx="3" class="border"/>
  <circle cx="10" cy="8" r="3" class="dot-r"/>
  <circle cx="19" cy="8" r="3" class="dot-y"/>
  <circle cx="28" cy="8" r="3" class="dot-g"/>
  <text x="36" y="11" class="lbl">PHILOSOPHY STREAM</text>

  <g clip-path="url(#clip-phil)">
    <g class="anim-phil">
      <text x="6" y="26" class="tick-phil">BECOME WHO YOU ARE — NIETZSCHE ▸ EXISTENCE PRECEDES ESSENCE — SARTRE ▸ ONE MUST IMAGINE SISYPHUS HAPPY — CAMUS ▸ AMOR FATI ▸ CHAOS → CREATE STARS ▸ TO MASTER THE WAY IS TO MASTER ONESELF — MUSASHI ▸ THERE IS A REASON I REFUSE TO LOSE ▸</text>
      <text x="1406" y="26" class="tick-phil">BECOME WHO YOU ARE — NIETZSCHE ▸ EXISTENCE PRECEDES ESSENCE — SARTRE ▸ ONE MUST IMAGINE SISYPHUS HAPPY — CAMUS ▸ AMOR FATI ▸ CHAOS → CREATE STARS ▸ TO MASTER THE WAY IS TO MASTER ONESELF — MUSASHI ▸ THERE IS A REASON I REFUSE TO LOSE ▸</text>
    </g>
  </g>

  <!-- Terminal 2: Data -->
  <rect x="394" y="2" width="384" height="34" rx="3" class="bg"/>
  <rect x="394" y="2" width="384" height="12" rx="3" class="hdr" style="fill:#0a0a0a"/>
  <rect x="394" y="8" width="384" height="6" class="hdr" style="fill:#0a0a0a"/>
  <rect x="394" y="2" width="384" height="34" rx="3" class="border"/>
  <circle cx="402" cy="8" r="3" class="dot-r"/>
  <circle cx="411" cy="8" r="3" class="dot-y"/>
  <circle cx="420" cy="8" r="3" class="dot-g"/>
  <text x="428" y="11" class="lbl-cyan">DATA STREAM</text>

  <g clip-path="url(#clip-data)">
    <g class="anim-data">
      <text x="398" y="26" class="tick-data">DATA CLEANING ▸ FEATURE ENGINEERING ▸ MODEL TRAINING ▸ HYPERPARAMETER TUNING ▸ BRONZE → SILVER → GOLD ▸ LIGHTGBM ▸ KS · GINI · AUC ▸ CRISP-DM ▸ REAL-TIME SCORING ▸ OCI ALWAYS FREE ▸ SQL DAILY SERIES ▸</text>
      <text x="1698" y="26" class="tick-data">DATA CLEANING ▸ FEATURE ENGINEERING ▸ MODEL TRAINING ▸ HYPERPARAMETER TUNING ▸ BRONZE → SILVER → GOLD ▸ LIGHTGBM ▸ KS · GINI · AUC ▸ CRISP-DM ▸ REAL-TIME SCORING ▸ OCI ALWAYS FREE ▸ SQL DAILY SERIES ▸</text>
    </g>
  </g>

</svg>
